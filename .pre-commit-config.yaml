default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        # Full pyflakes (F) catches undefined names, unused imports/vars,
        # etc.; I001 keeps import blocks sorted.
        args: [--fix, --select=F,I001, weaklink, tests, examples, scripts]
        pass_filenames: false

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        stages: [pre-commit]
        language_version: python3
        args: ["--config", "pyproject.toml", "weaklink", "tests"]
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        stages: [pre-commit]
        args: ["--config-file", "pyproject.toml", "weaklink", "tests"]
        pass_filenames: false

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
